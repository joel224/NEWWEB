<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Branch -->
  <path d="M 50 200 Q 150 180 250 190 Q 320 195 380 185" 
        stroke="#8B7355" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 80 205 Q 70 195 65 185" 
        stroke="#8B7355" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 180 192 Q 185 180 190 170" 
        stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 280 193 Q 285 185 290 178" 
        stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Small leaves on branch -->
  <ellipse cx="70" cy="180" rx="6" ry="3" fill="#B8C4A8" transform="rotate(-30 70 180)"/>
  <ellipse cx="78" cy="175" rx="5" ry="2.5" fill="#C4D0B8" transform="rotate(-45 78 175)"/>
  <ellipse cx="188" cy="168" rx="5" ry="2.5" fill="#B8C4A8" transform="rotate(20 188 168)"/>
  <ellipse cx="288" cy="175" rx="5.5" ry="3" fill="#C4D0B8" transform="rotate(-15 288 175)"/>
  
  <!-- Bird body -->
  <ellipse cx="200" cy="165" rx="45" ry="35" fill="#F5F0E8"/>
  
  <!-- Belly/sides (buff color) -->
  <ellipse cx="205" cy="175" rx="38" ry="28" fill="#E8D4B8"/>
  
  <!-- Back/wings -->
  <path d="M 175 145 Q 220 140 245 155 Q 255 165 250 175 Q 235 185 200 180 Q 175 175 170 160 Z" 
        fill="#9A9A9A"/>
  
  <!-- Wing details -->
  <path d="M 185 150 Q 215 148 235 160" stroke="#7A7A7A" stroke-width="1.5" fill="none"/>
  <path d="M 182 158 Q 210 156 228 168" stroke="#8A8A8A" stroke-width="1.2" fill="none"/>
  <path d="M 180 166 Q 205 165 220 175" stroke="#9A9A9A" stroke-width="1" fill="none"/>
  
  <!-- Black cap -->
  <ellipse cx="175" cy="128" rx="22" ry="18" fill="#1A1A1A"/>
  
  <!-- White cheek -->
  <ellipse cx="170" cy="138" rx="14" ry="12" fill="#FAF8F0"/>
  
  <!-- Black bib -->
  <path d="M 162 148 Q 170 158 178 148 Q 195 130 160 142 Q 164 142 162 148 Z" 
        fill="#1A1A1A"/>
  
  <!-- Beak -->
  <path d="M 152 135 L 142 138 L 152 141 Z" fill="#2A2A2A"/>
  
  <!-- Eye -->
  <circle cx="178" cy="133" r="3.5" fill="#1A1A1A"/>
  <circle cx="179" cy="132" r="1.2" fill="#FAF8F0"/>
  
  <!-- Tail -->
  <path d="M 240 160 Q 270 165 285 175 Q 288 177 285 178 Q 265 180 242 172 Z" 
        fill="#6A6A6A"/>
  
  <!-- Legs -->
  <path d="M 188 188 Q 190 198 188 205" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 208 188 Q 210 198 212 205" stroke="#3A3A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Feet on branch -->
  <path d="M 185 205 Q 188 208 192 207" stroke="#3A3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 210 205 Q 208 209 205 210" stroke="#3A3A3A" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Floating leaves -->
  <g opacity="0.6">
    <ellipse cx="310" cy="90" rx="8" ry="4" fill="#C4D0B8" transform="rotate(-20 310 90)"/>
    <ellipse cx="318" cy="85" rx="7" ry="3.5" fill="#B8C4A8" transform="rotate(-35 318 85)"/>
    <ellipse cx="324" cy="92" rx="6" ry="3" fill="#D0D8C0" transform="rotate(-10 324 92)"/>
  </g>
</svg>